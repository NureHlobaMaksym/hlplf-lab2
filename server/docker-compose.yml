services:
  postgres:
    image: postgres:15-alpine
    container_name: hlplf-lab2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - hlplf_lab2_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hlplf-lab2-server
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./:/app
      - server_node_modules:/app/node_modules
    command: sh -c "[ -d node_modules/express ] || npm ci; npm run migration:run && npm run dev"

volumes:
  hlplf_lab2_postgres_data:
  server_node_modules:
